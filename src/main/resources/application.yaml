server:
  servlet:
    context-path: /api/payroll

spring:
  application:
    name: wos-payroll
  profiles:
    active: dev
  main:
    # Banner is printed AFTER startup (see StartupBanner), so disable the default.
    banner-mode: "off"
  output:
    ansi:
      enabled: always
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
