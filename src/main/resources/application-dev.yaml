server:
  port: 8082
  servlet:
    context-path: /api/payroll

spring:
  application:
    name: wos-payroll
  datasource:
    url: jdbc:postgresql://localhost:5432/workos
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Shared JWT secret with wos-auth — wos-payroll only validates tokens, never issues them.
